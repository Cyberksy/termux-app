<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WEBFLEX — Connect Anywhere</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="landing-body">
  <div class="bg-glow"></div>
  <main class="landing-container glass">
    <h1 class="logo">WEBFLEX</h1>
    <p class="tagline">Connect Anywhere. Online or Offline.</p>

    <section class="auth-card">
      <div class="tabs">
        <button class="tab-btn active" data-tab="signup">Sign Up</button>
        <button class="tab-btn" data-tab="login">Login</button>
      </div>

      <form id="signup-form" class="auth-form active" autocomplete="off">
        <input type="text" id="signup-name" placeholder="Full Name" required />
        <input type="email" id="signup-email" placeholder="Email" required />
        <input type="password" id="signup-password" placeholder="Password" required minlength="6" />
        <button type="submit" class="btn-gold">Create Account</button>
      </form>

      <form id="login-form" class="auth-form" autocomplete="off">
        <input type="email" id="login-email" placeholder="Email" required />
        <input type="password" id="login-password" placeholder="Password" required />
        <button type="submit" class="btn-gold">Enter WEBFLEX</button>
      </form>

      <p id="auth-status" class="muted"></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
